name: Build

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout addon
        uses: actions/checkout@v4
        with:
          path: AE2LT-Packaged-Pattern-Provider

      - name: Checkout AE2 Lightning Tech
        uses: actions/checkout@v4
        with:
          repository: MOAKIEE/AE2-Lightning-Tech
          path: AE2-Lightning-Tech

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Ensure wrapper scripts are executable
        run: |
          chmod +x AE2-Lightning-Tech/gradlew
          chmod +x AE2LT-Packaged-Pattern-Provider/gradlew

      - name: Build AE2 Lightning Tech
        working-directory: AE2-Lightning-Tech
        run: ./gradlew clean build --no-daemon

      - name: Build addon
        working-directory: AE2LT-Packaged-Pattern-Provider
        env:
          AE2LT_JAR: ../AE2-Lightning-Tech/build/libs/ae2lt-1.0.10.jar
        run: ./gradlew clean build --no-daemon
